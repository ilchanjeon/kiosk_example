<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: grey;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: black;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .panel {
            background: whitesmoke;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        h2 {
            color: black;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid black;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: grey;
            color: white;
        }

        .btn-success {
            background: grey;
            color: white;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .log-container {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-size: 12px;
        }

        .sensorLog {
            height: 320px;
        }

        .log-time {
            color: #6c757d;
            margin-right: 10px;
        }

        .distance-display {
            text-align: center;
            padding: 5px;
            background: grey;
            border-radius: 10px;
            margin: 10px 0;
        }

        .distance-value {
            font-size: 1.5em;
            color: white;
            font-weight: bold;
        }

        .distance-unit {
            font-size: 1em;
            color: rgba(255,255,255,0.9);
            margin-top: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 5px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .numpad-btn {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .numpad-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .numpad-btn:active {
            transform: scale(0.95);
        }

        .numpad-btn.wide {
            grid-column: span 2;
        }

        .numpad-btn.clear {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .numpad-btn.clear:hover {
            background: #c0392b;
            border-color: #c0392b;
        }

    </style>
</head>
<body>
<button style="margin-bottom: 50px; margin-right: 30px; opacity: 0;" onclick="handleSecretClick();"> </button>
<div class="container">

    <h1>키오스크 테스트</h1>

    <div class="grid">
        <div class="panel">
            <h2>초음파 센서</h2>
            <div id="sensorStatus" class="status disconnected">연결 안됨</div>
            <div class="distance-display">
                <div class="distance-value" id="distanceValue">---</div>
                <div class="distance-unit">cm</div>
            </div>
            <div class="log-container sensorLog" id="sensorLog"></div>
        </div>

        <div class="panel">
            <h2>영수증 프린터</h2>
            <button class="btn-success" onclick="testPrint()" style="width: 100%; margin-bottom: 10px;">테스트 출력</button>
            <div class="log-container" id="printerLog"></div>
            <h2>바코드 리더기</h2>
            <input type="text" id="barcodeInput" placeholder="바코드를 스캔하세요..." autofocus>
            <div class="log-container" id="barcodeLog"></div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">비밀번호</div>
            <input type="password" id="passwordInput" class="modal-input" placeholder="비밀번호 입력" maxlength="10">
            <div class="numpad">
                <button class="numpad-btn" onclick="addPasswordDigit('1')">1</button>
                <button class="numpad-btn" onclick="addPasswordDigit('2')">2</button>
                <button class="numpad-btn" onclick="addPasswordDigit('3')">3</button>
                <button class="numpad-btn" onclick="addPasswordDigit('4')">4</button>
                <button class="numpad-btn" onclick="addPasswordDigit('5')">5</button>
                <button class="numpad-btn" onclick="addPasswordDigit('6')">6</button>
                <button class="numpad-btn" onclick="addPasswordDigit('7')">7</button>
                <button class="numpad-btn" onclick="addPasswordDigit('8')">8</button>
                <button class="numpad-btn" onclick="addPasswordDigit('9')">9</button>
                <button class="numpad-btn clear" onclick="clearPassword()">C</button>
                <button class="numpad-btn" onclick="addPasswordDigit('0')">0</button>
                <button class="numpad-btn" onclick="deleteLastDigit()">⌫</button>
            </div>
            <div class="modal-buttons">
                <button class="btn-danger" onclick="closePasswordModal()">취소</button>
                <button class="btn-primary" onclick="checkPassword()">확인</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 비번
    const ADMIN_PASSWORD = '1234';

    // 클릭 카운터
    let secretClickCount = 0;
    let secretClickTimeout = null;

    function handleSecretClick() {
        secretClickCount++;

        clearTimeout(secretClickTimeout);

        if (secretClickCount >= 6) {
            secretClickCount = 0;
            showPasswordModal();
        } else {
            secretClickTimeout = setTimeout(function() {
                secretClickCount = 0;
            }, 2000);
        }
    }

    function deleteLastDigit() {
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.value = passwordInput.value.slice(0, -1);
    }

    function clearPassword() {
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.value = '';
    }

    function addPasswordDigit(digit) {
        const passwordInput = document.getElementById('passwordInput');
        if (passwordInput.value.length < 10) {
            passwordInput.value += digit;
        }
    }

    function showPasswordModal() {
        const modal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        modal.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
    }

    function closePasswordModal() {
        const modal = document.getElementById('passwordModal');
        modal.style.display = 'none';
    }

    function checkPassword() {
        const passwordInput = document.getElementById('passwordInput');
        const inputPassword = passwordInput.value;

        if (inputPassword === ADMIN_PASSWORD) {
            closePasswordModal();
            if (confirm('키오스크를 종료하시겠습니까?')) {
                window.close();
                setTimeout(() => {alert('브라우저 설정으로 인해 자동으로 닫을 수 없습니다. 수동으로 창을 닫아주세요.');}, 2500);
            }
        } else {
            alert('비밀번호가 올바르지 않습니다.');
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        const modal = document.getElementById('passwordModal');
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closePasswordModal();
            }
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('passwordModal');
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closePasswordModal();
            }
        });
    });

    function addLog(containerId, message, type = 'info') {
        const logContainer = document.getElementById(containerId);
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';

        const time = new Date().toLocaleTimeString('ko-KR');
        logEntry.innerHTML = '<span class="log-time">[' + time + ']</span>' + message;

        logContainer.appendChild(logEntry);
        logContainer.scrollTop = logContainer.scrollHeight;

    }

    function processDistance(distance) {
        if (!isNaN(distance)) {
            document.getElementById('distanceValue').textContent = distance.toFixed();
            addLog('sensorLog', '거리 측정: ' + distance.toFixed() + ' cm');
        } else {
            addLog('sensorLog', '수신 데이터: ' + data);
        }
    }

    function submitBarcode() {
        const barcode = document.getElementById('barcodeInput').value.trim();
        if (!barcode) {
            addLog('barcodeLog','바코드를 입력하세요');
            return;
        }

        fetch('/api/barcode', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({barcode: barcode})
        })
            .then(response => response.json())
            .then(data => { if(data.result) addLog('barcodeLog','바코드 전송 완료: '+ data.barcode);
                            else addLog('barcodeLog','전송 실패' + data.barcode);})
            .catch(error => {
                console.error('오류:', error);
                addLog('barcodeLog','전송 실패');
            });
    }

    function testPrint() {
        fetch('/api/test-print', {method: 'POST'})
            .then(response => response.json())
            .then(data => { if(data.result) addLog('printerLog','테스트 출력 시작');
                            else addLog('printerLog','출력 실패');})
            .catch(error => addLog('printerLog','출력 실패'));
    }

    document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            submitBarcode();
        }
    });

    setInterval(() => {
        fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                processDistance(data.distance);
                if(data.userDetected) document.getElementById('sensorStatus').textContent = '사용자 감지됨';
                else document.getElementById('sensorStatus').textContent = '대기 중';
            });
    }, 1000);
</script>
</body>
</html>
