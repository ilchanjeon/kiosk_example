<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/global.js}"></script>
    <script th:src="@{/js/utils.js}"></script>

    <title>키오스크 시스템</title>
</head>
<body>
    <button style="margin-bottom: 50px; margin-right: 30px; opacity: 0;" onclick="handleSecretClick();"> </button>

    <main id="app"></main>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">비밀번호</div>
            <input type="password" id="passwordInput" class="modal-input" placeholder="비밀번호 입력" maxlength="10">
            <div class="numpad">
                <button class="numpad-btn" onclick="addPasswordDigit('1')">1</button>
                <button class="numpad-btn" onclick="addPasswordDigit('2')">2</button>
                <button class="numpad-btn" onclick="addPasswordDigit('3')">3</button>
                <button class="numpad-btn" onclick="addPasswordDigit('4')">4</button>
                <button class="numpad-btn" onclick="addPasswordDigit('5')">5</button>
                <button class="numpad-btn" onclick="addPasswordDigit('6')">6</button>
                <button class="numpad-btn" onclick="addPasswordDigit('7')">7</button>
                <button class="numpad-btn" onclick="addPasswordDigit('8')">8</button>
                <button class="numpad-btn" onclick="addPasswordDigit('9')">9</button>
                <button class="numpad-btn clear" onclick="clearPassword()">C</button>
                <button class="numpad-btn" onclick="addPasswordDigit('0')">0</button>
                <button class="numpad-btn" onclick="deleteLastDigit()">⌫</button>
            </div>
            <div class="modal-buttons">
                <button class="btn-danger" onclick="closePasswordModal()">취소</button>
                <button class="btn-primary" onclick="checkPassword()">확인</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
